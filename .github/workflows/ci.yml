name: ci
on:
  push: { branches: [main] }
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    strategy:
      matrix: { python: ["3.10", "3.11"] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ matrix.python }}", cache: pip }
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: mypy src
      - name: Initialize Airflow Database
        run: |
          export AIRFLOW_HOME=${{ runner.temp }}/airflow
          airflow db migrate
      - run: pytest -q
        env:
          AIRFLOW_HOME: ${{ runner.temp }}/airflow

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform -chdir=infra/terraform init -backend=false
      - run: terraform -chdir=infra/terraform validate
      - uses: bridgecrewio/checkov-action@v12
        with: { directory: infra/terraform, framework: terraform }

  dag-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - run: |
          pip install "apache-airflow==2.9.2" pydantic pyspark delta-spark great-expectations requests tenacity boto3 pytest chispa
      - name: Initialize Airflow Database
        run: |
          export AIRFLOW_HOME=${{ runner.temp }}/airflow
          airflow db migrate
      - run: pytest tests/test_dag_integrity.py -q
        env:
          AIRFLOW_HOME: ${{ runner.temp }}/airflow
